version: 2
updates:
  # Python dependencies - Lambda module
  - package-ecosystem: "pip"
    directory: "/02_AWS_Support_Case_Lambda"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "lambda"
    reviewers:
      - "percy-han"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    open-pull-requests-limit: 5

  # Python dependencies - Agent module
  - package-ecosystem: "pip"
    directory: "/04_create_knowledge_mcp_gateway_Agent"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "agent"
    reviewers:
      - "percy-han"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    open-pull-requests-limit: 5

  # Python dependencies - Knowledge Base module
  - package-ecosystem: "pip"
    directory: "/01_create_support_knowledegbase_rag"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    labels:
      - "dependencies"
      - "knowledge-base"
    reviewers:
      - "percy-han"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
