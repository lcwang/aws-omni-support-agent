<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Support Agent</title>
    <link rel="stylesheet" href="/static/style.css?v=5">
    <link rel="stylesheet" href="/static/session-styles.css?v=1">
    <link rel="stylesheet" href="/static/feedback-ui.css?v=1">
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>AWS Support Agent</h1>
                <div class="header-right">
                    <div class="user-id-container">
                        <label for="user-id-input" class="user-id-label">用户 ID:</label>
                        <input
                            type="text"
                            id="user-id-input"
                            class="user-id-input"
                            placeholder="输入 IAM 用户名"
                            title="输入你的 IAM 用户名用于权限验证"
                        />
                    </div>
                    <button id="reset-session-btn" class="reset-session-btn" title="开始新对话">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                        </svg>
                        新对话
                    </button>
                    <div class="status" id="status">
                        <span class="status-dot"></span>
                        <span class="status-text">Checking...</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-container">
            <div class="messages" id="messages">
                <!-- Welcome message -->
                <div class="message assistant">
                    <div class="message-avatar">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                        </svg>
                    </div>
                    <div class="message-content">
                        <div class="message-text">
                            你好！我是 AWS Support Agent，可以帮助你查询和管理 AWS Support Cases。你可以问我：
                            <ul>
                                <li>查询最近的 support cases</li>
                                <li>创建新的 support case</li>
                                <li>查看特定 case 的详情</li>
                                <li>更新 case 信息</li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <!-- Attachments Display -->
                <div id="attachments-container" class="attachments-container" style="display: none;">
                    <div class="attachments-title">附件：</div>
                    <div id="attachments-list" class="attachments-list"></div>
                </div>

                <form id="chat-form" class="input-form">
                    <input
                        type="file"
                        id="file-input"
                        multiple
                        style="display: none;"
                        accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg,.gif,.zip,.log"
                    />
                    <button type="button" class="attachment-button" id="attachment-button" title="添加附件">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
                        </svg>
                    </button>
                    <textarea
                        id="message-input"
                        class="message-input"
                        placeholder="输入消息... (Shift+Enter 换行，Enter 发送)"
                        rows="1"
                    ></textarea>
                    <button type="submit" class="send-button" id="send-button">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </form>
                <div class="input-hint">
                    Shift + Enter 换行 • Enter 发送 • 支持附件上传 (单个文件最大 5MB，总计最大 25MB)
                </div>
            </div>
        </main>
    </div>

    <!-- 点踩原因弹窗 -->
    <div id="negative-feedback-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>请告诉我们哪里不满意</h3>
                <button class="modal-close" onclick="closeNegativeFeedbackModal()">&times;</button>
            </div>

            <div class="modal-body">
                <p class="modal-hint">你的反馈将帮助我们改进回答质量</p>

                <!-- 预设原因选择 -->
                <div class="reason-options">
                    <label class="reason-option">
                        <input type="radio" name="negative_reason" value="hallucination" checked>
                        <span class="reason-label">
                            <strong>答案像是编造的</strong>
                            <small>回答的内容可能不准确或不存在</small>
                        </span>
                    </label>

                    <label class="reason-option">
                        <input type="radio" name="negative_reason" value="incorrect">
                        <span class="reason-label">
                            <strong>答案不正确</strong>
                            <small>回答的内容与事实不符</small>
                        </span>
                    </label>

                    <label class="reason-option">
                        <input type="radio" name="negative_reason" value="incomplete">
                        <span class="reason-label">
                            <strong>答案不完整</strong>
                            <small>回答缺少关键信息</small>
                        </span>
                    </label>

                    <label class="reason-option">
                        <input type="radio" name="negative_reason" value="irrelevant">
                        <span class="reason-label">
                            <strong>答案不相关</strong>
                            <small>回答没有解决我的问题</small>
                        </span>
                    </label>
                </div>

                <!-- 自由输入补充说明 -->
                <div class="user-comment-section">
                    <label for="user-comment">补充说明（可选）</label>
                    <textarea
                        id="user-comment"
                        class="user-comment-input"
                        placeholder="请具体描述哪里不满意，帮助我们改进..."
                        rows="3"
                        maxlength="500"></textarea>
                    <div class="char-count">
                        <span id="comment-char-count">0</span>/500
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeNegativeFeedbackModal()">
                    取消
                </button>
                <button class="btn btn-primary" onclick="submitNegativeFeedback()">
                    提交反馈
                </button>
            </div>
        </div>
    </div>

    <script src="/static/script.js?v=8"></script>
    <script src="/static/feedback-ui.js?v=2"></script>
    <script src="/static/debug.js?v=1"></script>
</body>
</html>
